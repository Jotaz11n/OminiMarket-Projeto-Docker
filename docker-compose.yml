version: '3.8'

services:
  db:
    image: mysql:8 # ou a versão que estiveres a usar
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    # ... as restantes configurações (environment, volumes, ports) mantêm-se iguais
  mysql:
    image: mysql:8.0
    container_name: ml_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mercadolivre
      MYSQL_USER: mluser
      MYSQL_PASSWORD: mlpass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ml_backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_USER: mluser
      DB_PASSWORD: mlpass123
      DB_NAME: mercadolivre
      DB_PORT: 3306
      JWT_SECRET: segredo_super_secreto_academico_2024
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ml_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ml_frontend
    restart: always
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ml_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:

networks:
  ml_network:
    driver: bridge
